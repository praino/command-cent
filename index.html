<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Life Scorecard</title>
<style>
:root{--bg:#f6f5f1;--card:#fff;--text:#18212f;--muted:#6b7280;--border:#e5e7eb;--dark:#111827;--soft:#eef2f7;--good:#16a34a;--warn:#ca8a04;--bad:#dc2626}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);padding-bottom:88px}
header{padding:22px 18px 8px;max-width:800px;margin:auto}
h1{margin:0;font-size:30px;letter-spacing:-.05em}
.sub{color:var(--muted);font-size:14px;margin-top:4px}
main{max-width:800px;margin:auto;padding:10px 14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
h2{font-size:20px;margin:0 0 12px;letter-spacing:-.03em}
h3{font-size:13px;margin:16px 0 8px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
input,textarea,select{width:100%;border:1px solid var(--border);border-radius:14px;padding:13px;font-size:16px;margin-bottom:10px;background:white}
textarea{min-height:110px}
button{width:100%;border:0;border-radius:14px;padding:12px 14px;font-size:15px;font-weight:700;background:var(--dark);color:white;margin:4px 0}
button.secondary{background:var(--soft);color:var(--text)}
button.danger{background:#fee2e2;color:var(--bad)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.score{font-size:46px;font-weight:800;letter-spacing:-.06em}
.bar{height:12px;background:var(--soft);border-radius:999px;overflow:hidden;margin:8px 0 12px}
.fill{height:100%;background:var(--dark);border-radius:999px}
.metric{display:flex;justify-content:space-between;align-items:center;margin:10px 0}
.item{border:1px solid var(--border);border-radius:16px;padding:12px;margin-bottom:9px;background:white}
.title{font-weight:750}
.meta{font-size:13px;color:var(--muted);margin-top:3px}
.dayrow{display:grid;grid-template-columns:56px 1fr;gap:10px;align-items:start;border-bottom:1px solid var(--border);padding:8px 0}
.hour{font-size:13px;color:var(--muted)}
nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 6px 18px}
nav button{background:transparent;color:var(--muted);font-size:12px;padding:8px 2px;margin:0;border-radius:12px}
nav button.active{background:var(--dark);color:white}
.hidden{display:none}
.empty{color:var(--muted);font-size:14px}
.small{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>Life Scorecard</h1>
  <div class="sub">Focus. Progress. Energy. Wellbeing.</div>
</header>

<main>
<section id="dashboard" class="tab">
  <div class="card">
    <h2>This Week</h2>
    <div class="score" id="weekScore">0%</div>
    <div class="bar"><div class="fill" id="weekFill"></div></div>
    <div id="areaScores"></div>
  </div>

  <div class="card">
    <h2>Today’s Focus</h2>
    <div id="todayFocus"></div>
  </div>

  <div class="card">
    <h2>Life Radar</h2>
    <div id="radar"></div>
  </div>
</section>

<section id="week" class="tab hidden">
  <div class="card">
    <h2>Weekly Targets</h2>
    <input id="targetTitle" placeholder="Target, e.g. Workout 4x" />
    <select id="targetArea">
      <option>Work</option><option>Family</option><option>Health</option><option>Wellbeing</option><option>Personal</option>
    </select>
    <button onclick="addTarget()">Add Target</button>
  </div>
  <div class="card">
    <h2>Progress</h2>
    <div id="targetsList"></div>
  </div>
</section>

<section id="day" class="tab hidden">
  <div class="card">
    <h2>Day View</h2>
    <input id="eventDate" type="date" />
    <input id="eventTime" type="time" />
    <input id="eventTitle" placeholder="Event or time block" />
    <select id="eventArea">
      <option>Work</option><option>Family</option><option>Health</option><option>Personal</option>
    </select>
    <button onclick="addEvent()">Add To Day</button>
  </div>
  <div class="card">
    <h2>Hour by Hour</h2>
    <div id="dayList"></div>
  </div>
</section>

<section id="checkin" class="tab hidden">
  <div class="card">
    <h2>End of Day Check-In</h2>
    <input id="checkDate" type="date" />
    <label>Mood: <span id="moodVal">3</span></label>
    <input id="mood" type="range" min="1" max="5" value="3" oninput="moodVal.textContent=this.value" />
    <label>Energy: <span id="energyVal">3</span></label>
    <input id="energy" type="range" min="1" max="5" value="3" oninput="energyVal.textContent=this.value" />
    <label>Stress: <span id="stressVal">3</span></label>
    <input id="stress" type="range" min="1" max="5" value="3" oninput="stressVal.textContent=this.value" />
    <input id="sleep" type="number" step=".5" placeholder="Sleep hours" />
    <select id="workedOut"><option>No workout</option><option>Workout completed</option></select>
    <select id="familyTime"><option>Low family time</option><option>Good family time</option><option>Great family time</option></select>
    <textarea id="win" placeholder="Biggest win today"></textarea>
    <textarea id="frustration" placeholder="Biggest frustration"></textarea>
    <button onclick="saveCheckin()">Save Check-In</button>
  </div>
  <div class="card">
    <h2>Wellbeing Trend</h2>
    <div id="checkinList"></div>
  </div>
</section>

<section id="capture" class="tab hidden">
  <div class="card">
    <h2>Capture</h2>
    <textarea id="note" placeholder="Brain dump anything here..."></textarea>
    <button onclick="saveNote()">Save Note</button>
  </div>

  <div class="card">
    <h2>Backup</h2>
    <button onclick="exportData()">Export JSON</button>
    <textarea id="backup" placeholder="Export/import data here"></textarea>
    <button class="secondary" onclick="importData()">Import JSON</button>
    <button class="danger" onclick="clearAll()">Clear All</button>
  </div>
</section>
</main>

<nav>
  <button class="active" onclick="showTab('dashboard',this)">Home</button>
  <button onclick="showTab('week',this)">Week</button>
  <button onclick="showTab('day',this)">Day</button>
  <button onclick="showTab('checkin',this)">EOD</button>
  <button onclick="showTab('capture',this)">Capture</button>
</nav>

<script>
const KEY="lifeScorecardV1";
let data=JSON.parse(localStorage.getItem(KEY))||{
  targets:[],events:[],checkins:[],notes:[]
};

function save(){localStorage.setItem(KEY,JSON.stringify(data));render()}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function today(){return new Date().toISOString().slice(0,10)}

eventDate.value=today();
checkDate.value=today();

function showTab(name,btn){
  document.querySelectorAll(".tab").forEach(x=>x.classList.add("hidden"));
  document.getElementById(name).classList.remove("hidden");
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function addTarget(){
  if(!targetTitle.value.trim())return;
  data.targets.push({id:id(),title:targetTitle.value.trim(),area:targetArea.value,done:false,created:today()});
  targetTitle.value="";
  save();
}

function addEvent(){
  if(!eventTitle.value.trim())return;
  data.events.push({id:id(),date:eventDate.value,time:eventTime.value,title:eventTitle.value.trim(),area:eventArea.value,done:false});
  eventTitle.value="";
  eventTime.value="";
  save();
}

function saveCheckin(){
  const existing=data.checkins.find(x=>x.date===checkDate.value);
  const entry={
    id:existing?.id||id(),
    date:checkDate.value,
    mood:+mood.value,
    energy:+energy.value,
    stress:+stress.value,
    sleep:+sleep.value||0,
    workedOut:workedOut.value==="Workout completed",
    familyTime:familyTime.value,
    win:win.value.trim(),
    frustration:frustration.value.trim()
  };
  data.checkins=data.checkins.filter(x=>x.date!==entry.date);
  data.checkins.push(entry);
  save();
}

function saveNote(){
  if(!note.value.trim())return;
  data.notes.unshift({id:id(),date:today(),text:note.value.trim()});
  note.value="";
  save();
}

function toggleTarget(id){
  const t=data.targets.find(x=>x.id===id);
  t.done=!t.done;
  save();
}

function remove(type,id){
  data[type]=data[type].filter(x=>x.id!==id);
  save();
}

function pct(done,total){return total?Math.round((done/total)*100):0}

function areaScore(area){
  const items=data.targets.filter(x=>x.area===area);
  return pct(items.filter(x=>x.done).length,items.length);
}

function wellbeingScore(){
  const recent=[...data.checkins].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7);
  if(!recent.length)return 0;
  const avgMood=recent.reduce((s,x)=>s+x.mood,0)/recent.length;
  const avgEnergy=recent.reduce((s,x)=>s+x.energy,0)/recent.length;
  const avgStress=recent.reduce((s,x)=>s+x.stress,0)/recent.length;
  return Math.round(((avgMood+avgEnergy+(6-avgStress))/15)*100);
}

function render(){
  const areas=["Work","Family","Health"];
  const scores=areas.map(areaScore);
  const wellbeing=wellbeingScore();
  const all=[...scores,wellbeing].filter(x=>x>0);
  const week=all.length?Math.round(all.reduce((a,b)=>a+b,0)/all.length):0;

  weekScore.textContent=week+"%";
  weekFill.style.width=week+"%";

  areaScores.innerHTML=[
    ...areas.map((a,i)=>metric(a,scores[i])),
    metric("Wellbeing",wellbeing)
  ].join("");

  const open=data.targets.filter(x=>!x.done);
  todayFocus.innerHTML=open.slice(0,3).map(x=>card(x.title,x.area,`<button class="secondary" onclick="toggleTarget('${x.id}')">Mark Done</button>`)).join("")||`<div class="empty">Add weekly targets to create focus.</div>`;

  const radarItems=[];
  const oldOpen=open.slice(0,4).map(x=>"Open target: "+x.title);
  radarItems.push(...oldOpen);
  const lastCheck=[...data.checkins].sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!lastCheck)radarItems.push("No EOD check-in yet");
  if(lastCheck&&lastCheck.energy<=2)radarItems.push("Energy has been low");
  if(lastCheck&&lastCheck.stress>=4)radarItems.push("Stress is elevated");
  if(lastCheck&&!lastCheck.workedOut)radarItems.push("No workout logged last check-in");

  radar.innerHTML=radarItems.length?radarItems.map(x=>`<div class="item"><div class="title">⚠ ${esc(x)}</div></div>`).join(""):`<div class="empty">Nothing needs attention.</div>`;

  targetsList.innerHTML=data.targets.map(x=>`
    <div class="item">
      <div class="title">${x.done?"✅":"⬜"} ${esc(x.title)}</div>
      <div class="meta">${esc(x.area)}</div>
      <div class="row">
        <button class="secondary" onclick="toggleTarget('${x.id}')">${x.done?"Undo":"Done"}</button>
        <button class="danger" onclick="remove('targets','${x.id}')">Delete</button>
      </div>
    </div>`).join("")||`<div class="empty">No weekly targets yet.</div>`;

  const selectedDate=eventDate.value||today();
  const events=data.events.filter(x=>x.date===selectedDate).sort((a,b)=>(a.time||"99").localeCompare(b.time||"99"));
  dayList.innerHTML=events.map(x=>`
    <div class="dayrow">
      <div class="hour">${x.time||"Anytime"}</div>
      <div class="item">
        <div class="title">${esc(x.title)}</div>
        <div class="meta">${esc(x.area)}</div>
        <button class="danger" onclick="remove('events','${x.id}')">Delete</button>
      </div>
    </div>`).join("")||`<div class="empty">No events for this day.</div>`;

  const checks=[...data.checkins].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  checkinList.innerHTML=checks.map(x=>`
    <div class="item">
      <div class="title">${x.date}</div>
      <div class="meta">Mood ${x.mood}/5 · Energy ${x.energy}/5 · Stress ${x.stress}/5 · Sleep ${x.sleep || "?"}h · ${x.workedOut?"Workout":"No workout"}</div>
      ${x.win?`<div class="small">Win: ${esc(x.win)}</div>`:""}
    </div>`).join("")||`<div class="empty">No check-ins yet.</div>`;
}

function metric(label,value){
  return `<div class="metric"><strong>${label}</strong><span>${value}%</span></div><div class="bar"><div class="fill" style="width:${value}%"></div></div>`;
}

function card(title,meta,actions=""){
  return `<div class="item"><div class="title">${esc(title)}</div><div class="meta">${esc(meta||"")}</div>${actions}</div>`;
}

function exportData(){backup.value=JSON.stringify(data,null,2)}
function importData(){try{data=JSON.parse(backup.value);;save()}catch(e){alert("Invalid JSON")}}
function clearAll(){if(confirm("Clear all data?")){data={targets:[],events:[],checkins:[],notes:[]};save()}}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}

eventDate.addEventListener("change",render);
render();
</script>
</body>
</html>
