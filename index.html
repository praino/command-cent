<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Life Dashboard</title>
<style>
:root{
  --bg:#09090b; --card:#141418; --card2:#1c1c22; --text:#f5f5f7;
  --muted:#a1a1aa; --line:#2a2a32; --accent:#8b5cf6; --green:#22c55e;
  --yellow:#f59e0b; --red:#ef4444; --blue:#38bdf8; --radius:24px;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#09090b,#111116);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:86px}
header{padding:26px 18px 10px;max-width:820px;margin:auto}
h1{font-size:32px;margin:0;letter-spacing:-.06em}
.sub{color:var(--muted);font-size:14px;margin-top:4px}
main{max-width:820px;margin:auto;padding:10px 14px}
.card{background:rgba(20,20,24,.92);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
h2{font-size:20px;margin:0 0 14px;letter-spacing:-.04em}
label{display:block;color:var(--muted);font-size:13px;margin:14px 0 6px}
input,textarea,select{width:100%;border:1px solid var(--line);background:#0f0f13;color:var(--text);border-radius:16px;padding:14px;font-size:16px}
textarea{min-height:90px}
button{width:100%;border:0;border-radius:16px;background:var(--accent);color:white;padding:14px;font-size:16px;font-weight:800;margin-top:12px}
button.secondary{background:var(--card2);color:var(--text)}
button.danger{background:#3b1111;color:#fecaca}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.metric{background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:14px}
.big{font-size:30px;font-weight:900;letter-spacing:-.06em}
.muted{color:var(--muted);font-size:13px}
.bar{height:10px;background:#27272f;border-radius:99px;overflow:hidden;margin-top:8px}
.fill{height:100%;background:var(--accent);border-radius:99px}
.item{background:#101014;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:10px}
.item strong{display:block;margin-bottom:4px}
nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d11;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);padding:8px 8px 18px}
nav button{background:transparent;color:var(--muted);font-size:13px;padding:10px 4px;margin:0;border-radius:14px}
nav button.active{background:var(--accent);color:white}
.hidden{display:none}
.rangeRow{display:flex;align-items:center;gap:12px}
.rangeRow input{padding:0}
.rangeVal{width:40px;text-align:center;font-size:24px;font-weight:900}
.pill{display:inline-block;background:#27272f;color:var(--muted);padding:5px 9px;border-radius:999px;font-size:12px;margin:4px 4px 0 0}
canvas{width:100%;height:180px;background:#0f0f13;border:1px solid var(--line);border-radius:18px}
</style>
</head>
<body>
<header>
  <h1>Life Dashboard</h1>
  <div class="sub">Mood · Energy · Stress · Fitness · Habits</div>
</header>

<main>
<section id="dashboard" class="tab">
  <div class="card">
    <h2>Last 7 Days</h2>
    <div class="grid">
      <div class="metric"><div class="muted">Mood</div><div class="big" id="avgMood">—</div></div>
      <div class="metric"><div class="muted">Energy</div><div class="big" id="avgEnergy">—</div></div>
      <div class="metric"><div class="muted">Stress</div><div class="big" id="avgStress">—</div></div>
      <div class="metric"><div class="muted">Workouts</div><div class="big" id="workoutRate">—</div></div>
    </div>
  </div>

  <div class="card">
    <h2>Wellbeing Score</h2>
    <div class="big" id="wellbeing">—</div>
    <div class="bar"><div class="fill" id="wellbeingFill"></div></div>
  </div>

  <div class="card">
    <h2>Trend</h2>
    <canvas id="chart" width="700" height="260"></canvas>
  </div>

  <div class="card">
    <h2>Insights</h2>
    <div id="insights"></div>
  </div>
</section>

<section id="checkin" class="tab hidden">
  <div class="card">
    <h2>End of Day Check-In</h2>

    <label>Date</label>
    <input id="date" type="date" />

    <label>Mood</label>
    <div class="rangeRow"><input id="mood" type="range" min="1" max="5" value="3" oninput="moodVal.textContent=this.value"><div class="rangeVal" id="moodVal">3</div></div>

    <label>Energy</label>
    <div class="rangeRow"><input id="energy" type="range" min="1" max="5" value="3" oninput="energyVal.textContent=this.value"><div class="rangeVal" id="energyVal">3</div></div>

    <label>Stress</label>
    <div class="rangeRow"><input id="stress" type="range" min="1" max="5" value="3" oninput="stressVal.textContent=this.value"><div class="rangeVal" id="stressVal">3</div></div>

    <div class="row">
      <div>
        <label>Sleep Hours</label>
        <input id="sleep" type="number" step=".25" placeholder="7.5" />
      </div>
      <div>
        <label>Alcohol Drinks</label>
        <input id="alcohol" type="number" min="0" step="1" placeholder="0" />
      </div>
    </div>

    <label>Worked Out?</label>
    <select id="workedOut" onchange="toggleWorkout()">
      <option value="no">No</option>
      <option value="yes">Yes</option>
    </select>

    <div id="workoutFields" class="hidden">
      <label>Workout Type</label>
      <select id="workoutType">
        <option>Strength</option>
        <option>Cardio</option>
        <option>HIIT</option>
        <option>Mobility</option>
        <option>Walk</option>
        <option>Sport</option>
        <option>Other</option>
      </select>

      <div class="row">
        <div>
          <label>Workout Time</label>
          <input id="workoutTime" type="time" />
        </div>
        <div>
          <label>Length Minutes</label>
          <input id="workoutMinutes" type="number" min="0" placeholder="45" />
        </div>
      </div>
    </div>

    <label>Nutrition Quality</label>
    <select id="nutrition">
      <option value="3">Average</option>
      <option value="5">Great</option>
      <option value="4">Good</option>
      <option value="2">Poor</option>
      <option value="1">Bad</option>
    </select>

    <label>Family Connection</label>
    <select id="family">
      <option value="3">Average</option>
      <option value="5">Great</option>
      <option value="4">Good</option>
      <option value="2">Low</option>
      <option value="1">Very low</option>
    </select>

    <label>Biggest Win</label>
    <textarea id="win"></textarea>

    <label>Biggest Stressor</label>
    <textarea id="stressor"></textarea>

    <button onclick="saveCheckin()">Save Check-In</button>
  </div>
</section>

<section id="history" class="tab hidden">
  <div class="card">
    <h2>History</h2>
    <div id="historyList"></div>
  </div>

  <div class="card">
    <h2>Backup</h2>
    <button class="secondary" onclick="exportData()">Export JSON</button>
    <textarea id="backup" placeholder="Export/import data here"></textarea>
    <button class="secondary" onclick="importData()">Import JSON</button>
    <button class="danger" onclick="clearAll()">Clear All</button>
  </div>
</section>
</main>

<nav>
  <button class="active" onclick="showTab('dashboard',this)">Dashboard</button>
  <button onclick="showTab('checkin',this)">Check-In</button>
  <button onclick="showTab('history',this)">History</button>
</nav>

<script>
const KEY="lifeDashboardV2";
let data=JSON.parse(localStorage.getItem(KEY))||{checkins:[]};

function today(){return new Date().toISOString().slice(0,10)}
date.value=today();

function save(){localStorage.setItem(KEY,JSON.stringify(data));render()}
function showTab(id,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}
function toggleWorkout(){workoutFields.classList.toggle("hidden",workedOut.value!=="yes")}

function saveCheckin(){
  const entry={
    date:date.value,
    mood:+mood.value,
    energy:+energy.value,
    stress:+stress.value,
    sleep:+sleep.value||0,
    alcohol:+alcohol.value||0,
    workedOut:workedOut.value==="yes",
    workoutType:workedOut.value==="yes"?workoutType.value:"",
    workoutTime:workedOut.value==="yes"?workoutTime.value:"",
    workoutMinutes:workedOut.value==="yes"?(+workoutMinutes.value||0):0,
    nutrition:+nutrition.value,
    family:+family.value,
    win:win.value.trim(),
    stressor:stressor.value.trim()
  };
  data.checkins=data.checkins.filter(x=>x.date!==entry.date);
  data.checkins.push(entry);
  save();
  alert("Saved.");
}

function avg(arr,key){
  const vals=arr.map(x=>+x[key]).filter(x=>!isNaN(x)&&x>0);
  return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):0;
}

function render(){
  const recent=[...data.checkins].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7);
  const moodAvg=avg(recent,"mood");
  const energyAvg=avg(recent,"energy");
  const stressAvg=avg(recent,"stress");
  const workoutPct=recent.length?Math.round(recent.filter(x=>x.workedOut).length/recent.length*100):0;
  const wellbeingScore=recent.length?Math.round(((moodAvg+energyAvg+(6-stressAvg)+avg(recent,"nutrition")+avg(recent,"family"))/25)*100):0;

  avgMood.textContent=moodAvg?moodAvg.toFixed(1):"—";
  avgEnergy.textContent=energyAvg?energyAvg.toFixed(1):"—";
  avgStress.textContent=stressAvg?stressAvg.toFixed(1):"—";
  workoutRate.textContent=recent.length?workoutPct+"%":"—";
  wellbeing.textContent=recent.length?wellbeingScore+"%":"—";
  wellbeingFill.style.width=wellbeingScore+"%";

  renderChart(recent.reverse());
  renderInsights();
  renderHistory();
}

function renderInsights(){
  const c=data.checkins;
  const workoutDays=c.filter(x=>x.workedOut);
  const nonWorkoutDays=c.filter(x=>!x.workedOut);
  const alcoholDays=c.filter(x=>x.alcohol>0);
  const noAlcoholDays=c.filter(x=>x.alcohol===0);
  const insights=[];

  if(workoutDays.length&&nonWorkoutDays.length){
    insights.push(`Workout days mood avg: ${avg(workoutDays,"mood").toFixed(1)} vs non-workout: ${avg(nonWorkoutDays,"mood").toFixed(1)}`);
    insights.push(`Workout days energy avg: ${avg(workoutDays,"energy").toFixed(1)} vs non-workout: ${avg(nonWorkoutDays,"energy").toFixed(1)}`);
  }
  if(alcoholDays.length&&noAlcoholDays.length){
    insights.push(`Alcohol days energy avg: ${avg(alcoholDays,"energy").toFixed(1)} vs no-alcohol: ${avg(noAlcoholDays,"energy").toFixed(1)}`);
    insights.push(`Alcohol days stress avg: ${avg(alcoholDays,"stress").toFixed(1)} vs no-alcohol: ${avg(noAlcoholDays,"stress").toFixed(1)}`);
  }
  if(c.length>=3){
    insights.push(`Best mood day: ${[...c].sort((a,b)=>b.mood-a.mood)[0].date}`);
    insights.push(`Average sleep: ${avg(c,"sleep").toFixed(1)} hrs`);
  }

  insightsEl=insights.length?insights.map(x=>`<div class="item"><strong>${esc(x)}</strong></div>`).join(""):`<div class="muted">Add a few check-ins to unlock insights.</div>`;
  document.getElementById("insights").innerHTML=insightsEl;
}

function renderHistory(){
  const list=[...data.checkins].sort((a,b)=>b.date.localeCompare(a.date));
  historyList.innerHTML=list.length?list.map(x=>`
    <div class="item">
      <strong>${x.date}</strong>
      <span class="pill">Mood ${x.mood}</span>
      <span class="pill">Energy ${x.energy}</span>
      <span class="pill">Stress ${x.stress}</span>
      <span class="pill">Sleep ${x.sleep || "?"}h</span>
      <span class="pill">Alcohol ${x.alcohol}</span>
      <span class="pill">${x.workedOut ? `${x.workoutType} ${x.workoutMinutes}m` : "No workout"}</span>
      ${x.win?`<div class="muted" style="margin-top:8px">Win: ${esc(x.win)}</div>`:""}
      ${x.stressor?`<div class="muted">Stressor: ${esc(x.stressor)}</div>`:""}
    </div>
  `).join(""):`<div class="muted">No check-ins yet.</div>`;
}

function renderChart(rows){
  const c=document.getElementById("chart");
  const ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);
  ctx.strokeStyle="#2a2a32";
  ctx.lineWidth=1;
  for(let i=1;i<5;i++){let y=i*45;ctx.beginPath();ctx.moveTo(30,y);ctx.lineTo(680,y);ctx.stroke();}
  drawLine(rows,"mood","#8b5cf6");
  drawLine(rows,"energy","#22c55e");
  drawLine(rows,"stress","#ef4444");
  ctx.fillStyle="#a1a1aa";ctx.font="22px -apple-system";
  ctx.fillText("Mood",40,245);ctx.fillText("Energy",140,245);ctx.fillText("Stress",265,245);
}

function drawLine(rows,key,color){
  if(!rows.length)return;
  const ctx=chart.getContext("2d");
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=4;
  ctx.beginPath();
  rows.forEach((r,i)=>{
    const x=45+(i*(600/Math.max(rows.length-1,1)));
    const y=220-(r[key]/5*180);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  rows.forEach((r,i)=>{
    const x=45+(i*(600/Math.max(rows.length-1,1)));
    const y=220-(r[key]/5*180);
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
  });
}

function exportData(){backup.value=JSON.stringify(data,null,2)}
function importData(){try{data=JSON.parse(backup.value);save()}catch(e){alert("Invalid JSON")}}
function clearAll(){if(confirm("Clear all data?")){data={checkins:[]};save()}}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}

render();
</script>
</body>
</html>
